name: Portfolio

on:
  push:
    branches: [main]

# Necessary permissions for GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    # This links the deployment to the "Settings > Environments" tab
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload static files
        uses: actions/upload-pages-artifact@v3 # Ensure version compatibility
        with:
          path: '.' # you can change this if your site is in a subfolder like /dist

      - name: Deploy to GitHub Pages
        id: deployment # This MUST match the ID used in the 'url' above
        uses: actions/deploy-pages@v4