name: Full GitHub Actions Workflow

on:
  push:
    branches: [main]
  pull_request:
    branches: [dev]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  GLOBAL_VAR: "Hello"

jobs:
  build:
    name: Build Job
    runs-on: ubuntu-latest

    env:
      JOB_VAR: "Build Stage"

    strategy:
      matrix:
        node-version: [16, 18]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test

      - name: Use Secret
        run: echo "Using secret"
        env:
          API_KEY: ${{ secrets.API_KEY }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: build-files
          path: .

  deploy:
    name: Deploy Job
    needs: build
    runs-on: ubuntu-latest
    # environment: production

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v3
        with:
          name: build-files

      - name: Deploy App
        run: echo "Deploying..."